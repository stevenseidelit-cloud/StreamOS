name: Coordination

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"
      - name: Test validator
        run: python -m unittest discover -s scripts/tests -v
      - name: Validate coordination tasks
        run: python scripts/validate_coordination.py
      - name: Collect changed files
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git diff --no-renames --name-only --diff-filter=ACMRD "$BASE_SHA" "$HEAD_SHA" > "$RUNNER_TEMP/changed-files.txt"
          mkdir -p "$RUNNER_TEMP/base-tree/.coordination/tasks"
          if git cat-file -e "$BASE_SHA:.coordination/tasks" 2>/dev/null; then
            git archive "$BASE_SHA" .coordination/tasks | tar -x -C "$RUNNER_TEMP/base-tree"
          fi
      - name: Validate changed files against reservation
        if: github.event_name == 'pull_request'
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          if git cat-file -e "${{ github.event.pull_request.base.sha }}:scripts/validate_coordination.py" 2>/dev/null; then
            python scripts/validate_coordination.py --branch "$HEAD_BRANCH" --changed-files "$RUNNER_TEMP/changed-files.txt" --base-tasks-dir "$RUNNER_TEMP/base-tree/.coordination/tasks"
          else
            echo "Bootstrap PR: base branch has no coordination validator yet."
          fi
